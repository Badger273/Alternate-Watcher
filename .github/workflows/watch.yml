name: Alternate Verfuegbarkeits-Watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check availability
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: fdaxner@icloud.com
        run: python check_availability.py

      - name: Commit state
        run: |
          git config user.name "availability-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json last_checked.txt
          git diff --quiet --cached || git commit -m "Update availability state"
          git push
